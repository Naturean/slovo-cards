<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #1e293b; }
    .letter { fill: #ffffff; font-family: system-ui, -apple-system, sans-serif; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #e2e8f0; }
      .letter { fill: #1e293b; }
    }
  </style>
  <rect class="bg" x="1" y="1" width="30" height="30" rx="6" ry="6"/>
  <text class="letter" x="15.5" y="16" text-anchor="middle" dominant-baseline="central" font-size="20">С</text>
</svg>
